<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tester.io — The future of leverage is here</title>
  <meta name="description" content="Tester.io brings our love for crypto into Web3. Trade, monitor and hold the tokens you love — built on Web3, powered by you." />

  <!-- Favicon (real Tester.io brand logo, cropped from brand_assets/Tester Logo.png) -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#0A0A0A" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet" />
  <!-- Tester Tech display face — used by the page-transition overlay so it matches the Tester Tech theme -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet" />

  <!-- enable JS animations only when motion is allowed (before paint).
       The 5s intro shows only ONCE per browsing session — `intro` is added on the
       first visit, then a sessionStorage flag suppresses it on later page loads
       (internal navigation, back/forward). A brand-new visit/tab replays it.
       When skipped we add `no-intro`, which hides #loader via CSS (no flash). -->
  <script>
    (function () {
      var d = document.documentElement;
      var rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var seen = false;
      try { seen = sessionStorage.getItem('testerio_intro_seen') === '1'; } catch (e) {}
      if (!rm) d.classList.add('anim');
      if (!rm && !seen) d.classList.add('intro');
      else d.classList.add('no-intro');
    })();
  </script>

  <!-- Scale the whole UI up on large displays (≈115–130% browser zoom). Reconstructs the true
       viewport width as innerWidth × currentZoom so resize never feeds back on itself. -->
  <script>
    (function () {
      function applyZoom() {
        try {
          var el = document.documentElement;
          var cur = parseFloat(el.style.zoom) || 1;
          var real = window.innerWidth * cur;
          var z = real >= 2400 ? 1.3 : real >= 1900 ? 1.25 : real >= 1680 ? 1.12 : 1;
          el.style.zoom = z === 1 ? '' : String(z);
        } catch (e) {}
      }
      applyZoom();
      window.addEventListener('resize', applyZoom);
    })();
  </script>
</head>
<body class="bg-night-950 text-white font-sans antialiased overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
