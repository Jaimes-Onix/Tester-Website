<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Tester.io</title>
  <meta name="description" content="Thanks for reaching out to Tester.io. Redirecting you to the product…" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="theme-color" content="#0A0A0A" />

  <!-- No-JS / fallback redirect to the product page after 5s. -->
  <noscript><meta http-equiv="refresh" content="5; url=/product.html" /></noscript>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --gold-100:#F7E8C2; --gold-200:#F2DDA8; --gold-300:#E6B979; --gold-500:#C6A559;
      --bg:#0A0A0A; --text:#ECEAE6; --mute:#8d8d92; --line:rgba(255,255,255,.07);
      --grad-gold:linear-gradient(140deg,#F2DDA8,#E6B979 45%,#C6A559);
      --ease:cubic-bezier(.16,1,.3,1);
      --font:"Montserrat",sans-serif;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
    body{
      font-family:var(--font); font-weight:500; color:var(--text);
      background:
        radial-gradient(820px 520px at 50% -8%, rgba(230,185,121,.12), transparent 62%),
        radial-gradient(700px 600px at 88% 14%, rgba(198,165,89,.07), transparent 60%),
        linear-gradient(180deg,#0A0A0A,#070707);
      -webkit-font-smoothing:antialiased;
      display:grid; place-items:center; min-height:100svh; padding:28px;
      overflow:hidden; position:relative;
    }
    a{ color:inherit; text-decoration:none; }
    ::selection{ background:rgba(230,185,121,.3); color:#fff; }
    :focus-visible{ outline:2px solid var(--gold-300); outline-offset:3px; border-radius:8px; }

    /* faint dot texture */
    body::before{
      content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
      background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
      background-size:26px 26px;
      -webkit-mask-image:radial-gradient(circle at 50% 40%, #000, transparent 78%);
              mask-image:radial-gradient(circle at 50% 40%, #000, transparent 78%);
    }

    .card{
      position:relative; z-index:1; width:min(540px,100%); text-align:center;
      padding:48px 36px 40px;
      border:1px solid var(--line); border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0) 38%), linear-gradient(180deg,#131313,#0B0B0B);
      box-shadow:0 40px 90px -50px rgba(230,185,121,.4), 0 10px 40px rgba(0,0,0,.5);
      animation:rise .7s var(--ease) both;
    }
    @keyframes rise{ from{ opacity:0; transform:translateY(18px) scale(.985); } to{ opacity:1; transform:none; } }

    .brand{ display:inline-flex; align-items:center; gap:9px; font-weight:800; font-size:1rem; letter-spacing:-.01em; margin-bottom:30px; }
    .brand img{ width:26px; height:26px; }
    .brand .io{ background:var(--grad-gold); -webkit-background-clip:text; background-clip:text; color:transparent; }

    /* checkmark inside a depleting countdown ring */
    .ring{ position:relative; width:118px; height:118px; margin:0 auto 26px; }
    .ring svg{ width:100%; height:100%; transform:rotate(-90deg); }
    .ring .track{ stroke:rgba(255,255,255,.08); }
    .ring .prog{
      stroke:url(#g); stroke-linecap:round;
      stroke-dasharray:326.7; stroke-dashoffset:0;
      filter:drop-shadow(0 0 6px rgba(230,185,121,.45));
      animation:deplete 5s linear forwards;
    }
    @keyframes deplete{ to{ stroke-dashoffset:326.7; } }
    .ring .check{
      position:absolute; inset:0; display:grid; place-items:center;
    }
    .ring .check span{
      width:60px; height:60px; border-radius:50%; display:grid; place-items:center;
      background:var(--grad-gold); box-shadow:0 0 26px -4px rgba(230,185,121,.6);
      animation:pop .55s var(--ease) .15s both;
    }
    @keyframes pop{ 0%{ transform:scale(0); } 70%{ transform:scale(1.12); } 100%{ transform:scale(1); } }

    h1{ font-size:clamp(28px,6vw,38px); font-weight:800; letter-spacing:-.03em; line-height:1.04; }
    h1 .g{ background:var(--grad-gold); -webkit-background-clip:text; background-clip:text; color:transparent; }
    p.lead{ margin-top:14px; color:var(--mute); font-size:15px; line-height:1.7; max-width:38ch; margin-inline:auto; }

    .count{
      margin-top:26px; display:inline-flex; align-items:center; gap:9px;
      font-size:12.5px; font-weight:600; color:var(--mute);
      border:1px solid var(--line); background:rgba(255,255,255,.03);
      padding:9px 16px; border-radius:99px;
    }
    .count b{ color:var(--gold-200); font-weight:800; font-variant-numeric:tabular-nums; }
    .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold-300); box-shadow:0 0 10px var(--gold-300); animation:blink 1s steps(2) infinite; }
    @keyframes blink{ 50%{ opacity:.3; } }

    .btn{
      margin-top:28px; display:inline-flex; align-items:center; gap:9px;
      font-weight:700; font-size:13.5px; color:#1A1308;
      background:var(--grad-gold); padding:13px 26px; border-radius:99px;
      box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 14px 32px -14px rgba(230,185,121,.6);
      transition:transform .35s var(--ease), filter .35s var(--ease);
    }
    .btn:hover{ transform:translateY(-2px); filter:brightness(1.05); }
    .btn:active{ transform:translateY(0) scale(.985); }
    .btn svg{ transition:transform .35s var(--ease); }
    .btn:hover svg{ transform:translateX(3px); }

    @media (prefers-reduced-motion: reduce){
      *{ animation:none !important; }
    }
  </style>
</head>
<body>
  <main class="card" role="status" aria-live="polite">
    <a class="brand" href="/" aria-label="Tester.io home">
      <img src="/tester-logo.png" alt="" />
      <span>Tester<span class="io">.io</span></span>
    </a>

    <div class="ring" aria-hidden="true">
      <svg viewBox="0 0 120 120">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#F2DDA8" />
            <stop offset="1" stop-color="#C6A559" />
          </linearGradient>
        </defs>
        <circle class="track" cx="60" cy="60" r="52" fill="none" stroke-width="6" />
        <circle class="prog"  cx="60" cy="60" r="52" fill="none" stroke-width="6" />
      </svg>
      <div class="check">
        <span>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#1A1308" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5 9-11" /></svg>
        </span>
      </div>
    </div>

    <h1>You're <span class="g">on the list</span></h1>
    <p class="lead">Thanks for reaching out — we've saved your details and someone from the team will be in touch shortly.</p>

    <div class="count">
      <span class="dot"></span>
      Taking you to the product in <b id="secs">5</b>s…
    </div>

    <div>
      <a class="btn" href="/product.html">
        Go now
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6" /></svg>
      </a>
    </div>
  </main>

  <script>
    (function () {
      var DEST = "/product.html";
      var remaining = 5;
      var el = document.getElementById("secs");
      var timer = setInterval(function () {
        remaining -= 1;
        if (el) el.textContent = String(Math.max(remaining, 0));
        if (remaining <= 0) {
          clearInterval(timer);
          window.location.href = DEST;
        }
      }, 1000);
      // Hard fallback in case the interval is throttled (e.g. background tab).
      setTimeout(function () { window.location.href = DEST; }, 5200);
    })();
  </script>
</body>
</html>
